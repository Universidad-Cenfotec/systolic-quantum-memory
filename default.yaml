# ============================================================================
# SQM Research - Default Configuration File
# ============================================================================
# This file defines all experiment configurations, workloads, and parameters
# Can be overridden by CLI arguments when running main.py

# ============================================================================
# Global Settings
# ============================================================================
global:
  backend: simulator                    # Options: simulator, hardware
  seed: null                            # Random seed (null = random)

# ============================================================================
# Simulator Configuration
# ============================================================================
simulator:
  # Compiler parameters
  compiler:
    R: 1                                # Memory registers
    n: 1                                # Qubits per register
    c_max: 1                            # Gate cost threshold
    t_max_ns: 1000000                   # Time threshold (nanoseconds)
  
  # Simulation parameters
  execution:
    shots: 1024                         # Number of shots
    initial_state: 0                    # 0=|0>, 1=|1>, 2=|+>, 3=|->
    workload_type: custom             # Options: standard, delay, custom
  
  # Thermal parameters (quantum noise model)
  thermal:
    use_default: true                   # Use default IBM values
    T1_ns: 149149                       # T1 relaxation time (nanoseconds)
    T2_ns: 38194                        # T2 dephasing time (nanoseconds)
    idle_time_ns: 1000                  # Idle period duration (nanoseconds)

# ============================================================================
# Hardware Configuration
# ============================================================================
hardware:
  # IBM Quantum connection
  backend_name: ibm_kingston            # IBM backend to use
  channel: ibm_quantum_platform         # Channel: ibm_quantum_platform or ibm_quantum
  
  # Compiler parameters (same as simulator)
  compiler:
    R: 1
    n: 1
    c_max: 1
    t_max_ns: 1000000
  
  # Execution parameters
  execution:
    shots: 1024                         # Hardware shots (lower than simulator)
    initial_state: 0
    workload_type: standard
    scenarios: null                     # null = all, or "1,3" for specific scenarios

# ============================================================================
# Workload Definitions
# ============================================================================
workloads:
  standard:
    description: Read-Write patterns of increasing complexity
    count: 10
    # Auto-generated: READ_0 (2*i times) + WRITE_0 + READ_0 (2*i times) + READ_0
  
  delay:
    description: IDLE delay sweep
    delays_ns: [10, 20, 40, 80, 100, 150, 200, 300, 400, 500]
    # Auto-generated: WRITE_0 + IDLE_X + READ_0 for each delay X
  
  custom:
    description: Custom workload definitions
    workloads:
      - name: "Test Workload 1"
        instructions: ["READ_0", "WRITE_0", "READ_0"]
      
      - name: "Test Workload 2"
        instructions: ["WRITE_0", "READ_0", "WRITE_0", "READ_0"]

# ============================================================================
# Output Configuration
# ============================================================================
output:
  results_dir: results/                 # Where to save results
  save_csv: true                        # Save comparison results to CSV
  save_plots: true                      # Generate comparison plots
  plot_format: png                      # Format: png, pdf, svg
  verbose: true                         # Print detailed output

# ============================================================================
# Advanced Options
# ============================================================================
advanced:
  flow_mode: 1                          # 1=Operation register (Flow)
  parallel_workloads: false             # Parallelize workload execution
  timeout_seconds: 3600                 # Timeout for long-running experiments
  cache_results: false                  # Cache intermediate results
